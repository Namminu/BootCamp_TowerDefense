<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Changmin Kang" />
    <title>타워 디펜스 게임</title>
    <link rel="icon" type="image/x-icon" href="/tower_defense_client/images/favicon.ico" />
    <style>
      body {
        display: flex;
        flex-direction: column; /* 세로 방향으로 배치 */
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #2d2d2d;
      }
      #gameCanvas {
        border: 2px solid #000;
      }

      #buyTowerButton {
        margin-top: 20px; /* Adds space between the canvas and the button */
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #4CAF50; /* Green background */
        color: white;
        border: none;
        border-radius: 5px;
      }

      #buyTowerButton:hover {
        background-color: #45a049; /* Darker green on hover */
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="1920" height="1080"></canvas>
    <button id="buyTowerButton1" class="buyButton">1번 타워 구입</button>
    <button id="buyTowerButton2" class="buyButton">2번 타워 구입</button>
    <button id="buyTowerButton3" class="buyButton">3번 타워 구입</button>
    
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script type="module">
      import "./src/game.js";
    </script>
  </body>
</html>
