<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Changmin Kang" />
    <title>타워 디펜스 게임</title>
    <link rel="icon" type="image/x-icon" href="/tower_defense_client/images/favicon.ico" />
    <style>
      body {
        display: flex;
        flex-direction: column; /* 세로 방향으로 배치 */
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #2d2d2d;
      }
      #gameCanvas {
        border: 2px solid #000;
      }

      #buyTowerButton {
        margin-top: 20px; /* Adds space between the canvas and the button */
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #4CAF50; /* Green background */
        color: white;
        border: none;
        border-radius: 5px;
      }

      #buyTowerButton:hover {
        background-color: #45a049; /* Darker green on hover */
      }

      #towerInfoModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background-color: white;
  padding: 20px;
  border-radius: 5px;
  text-align: center;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 30px;
  cursor: pointer;
}

    </style>
  </head>
  <body>

    <div id="towerInfoModal" style="display: none;">
      <div class="modal-content">
        <span id="closeModal" class="close-btn">&times;</span>
        <h2>타워 정보</h2>
        <p id="towerLevel">레벨: </p>
        <p id="towerAttackPower">공격력: </p>
        <p id="towerRange">사거리: </p>
        <p id="towerCost">비용: </p>
      </div>
    </div>

    <canvas id="gameCanvas" width="1920" height="1080"></canvas>
    <button id="buyTowerButton1" class="buyButton">1번 타워 구입</button>
    <button id="buyTowerButton2" class="buyButton">2번 타워 구입</button>
    <button id="buyTowerButton3" class="buyButton">3번 타워 구입</button>

  
    
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script type="module">
      import "./src/game.js";
    </script>
  </body>
</html>
